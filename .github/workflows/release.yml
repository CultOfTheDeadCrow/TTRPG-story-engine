name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set C++20 flag (Linux — required for better-sqlite3 with Electron 35)
        if: runner.os == 'Linux'
        run: echo "CXXFLAGS=-std=c++20" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install --no-warnings

      - name: Build (electron-vite)
        run: npx electron-vite build

      - name: Package & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} --publish always
